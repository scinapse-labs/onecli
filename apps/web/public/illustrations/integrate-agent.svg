<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Agent head — rounded square (shifted left) -->
  <rect x="14" y="30" width="50" height="46" rx="12" />

  <!-- Eyes -->
  <circle cx="31" cy="50" r="3.5" />
  <circle cx="49" cy="50" r="3.5" />

  <!-- Mouth -->
  <path d="M34 63 Q39 68 46 63" />

  <!-- Antenna -->
  <line x1="39" y1="30" x2="39" y2="21" />
  <circle cx="39" cy="18" r="2.5" />

  <!-- Connection cable flowing right -->
  <path d="M64 53 Q76 53 82 44 Q88 35 96 35" />

  <!-- Target node -->
  <circle cx="101" cy="35" r="8" />
  <circle cx="101" cy="35" r="3" fill="currentColor" stroke="none" />

  <!-- Small connection dot on cable -->
